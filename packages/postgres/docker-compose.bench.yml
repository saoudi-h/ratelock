services:
    postgres:
        image: postgres:16-alpine
        container_name: ratelock-postgres-bench
        environment:
            POSTGRES_USER: ratelock
            POSTGRES_PASSWORD: ratelock
            POSTGRES_DB: ratelock_bench
        ports:
            - '5433:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ratelock -d ratelock_bench']
            interval: 2s
            timeout: 3s
            retries: 15
