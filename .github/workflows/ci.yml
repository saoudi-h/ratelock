name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (${{ matrix.runtime }})
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Node + pnpm)
        uses: ./.github/actions/install

      - name: Build
        run: |
          if [ "${{ matrix.runtime }}" = "bun" ]; then
            bun run build
          else
            pnpm build
          fi

      - name: Test
        env:
          CI: true
        run: |
          if [ "${{ matrix.runtime }}" = "bun" ]; then
            bun run test
          else
            pnpm test
          fi

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Build
        run: pnpm build

      - name: Redis integration
        run: pnpm --filter @ratelock/redis test:integration

      - name: Postgres integration
        run: pnpm --filter @ratelock/postgres test:integration

  lint:
    name: Lint, Typecheck & Publint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Publint
        run: |
          for pkg in packages/core packages/local packages/redis packages/postgres; do
            echo "Checking $pkg..."
            (cd $pkg && npx publint)
          done
